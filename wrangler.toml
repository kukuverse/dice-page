name = "kukuverse-site"
compatibility_date = "2026-06-11"
pages_build_output_dir = "./frontend"

[vars]
RESEND_FROM = "KUKUVERSE <hello@example.com>"

[[d1_databases]]
binding = "DB"
database_name = "kukuverse-production"
database_id = "REPLACE_WITH_D1_DATABASE_ID"

[[r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "kukuverse-uploads"
